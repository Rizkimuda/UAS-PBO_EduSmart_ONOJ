# Database Configuration (H2 File-based)
spring.datasource.url=jdbc:h2:file:./edusmart;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# SQL Initialization Seed Setup
# Defer datasource initialization so that data.sql runs AFTER JPA creates the tables.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Logging Levels
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
